manifest_schema_version = 1

service = "file_drop"
display_name = "File Drop"
description = "Import any supported file by dropping it into the app window or using the Import button. Works with documents, ebooks, plain text, structured text, and common image formats."
category = "files"
auth_mode = "none"
tier = "free"

connector_type = "file"
entry_point = "connectors.file_drop.connector:FileDropConnector"
supported_formats = [
  "pdf",
  "docx",
  "xlsx",
  "html",
  "txt",
  "md",
  "json",
  "csv",
  "png",
  "jpg",
  "jpeg",
  "gif",
  "webp",
  "bmp",
  "tiff",
]
privacy_posture = "local_only"

sample_files = ["samples/example.md", "samples/example.txt"]

export_instructions = """
No export required. Drag-and-drop files into the app window, or use
**Import → File** from the dashboard. Duplicate imports (same content hash)
are skipped automatically.
"""
