name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build-backend:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            ext: .exe
          - os: macos-latest
            target: aarch64-apple-darwin
            ext: ""
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: apps/backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install uv
        uses: astral-sh/setup-uv@v3
      - name: Install dependencies
        run: uv sync --frozen --all-extras
      - name: Build sidecar with PyInstaller
        shell: bash
        run: |
          uv run pyinstaller \
            --name lifescribe-backend \
            --onefile \
            --clean \
            --noconfirm \
            --console \
            --hidden-import lifescribe.ingest.mime \
            --hidden-import lifescribe.ingest.extractors.registry \
            --hidden-import lifescribe.ingest.registry_default \
            src/lifescribe/api/main.py
      - name: Copy connectors alongside sidecar
        shell: bash
        run: |
          cp -r ../../connectors dist/connectors
          find dist/connectors -type d -name "__pycache__" -exec rm -rf {} + 2>/dev/null || true
      - name: Place sidecar for Tauri
        shell: bash
        run: |
          mkdir -p ../desktop/src-tauri/binaries
          cp "dist/lifescribe-backend${{ matrix.ext }}" \
             "../desktop/src-tauri/binaries/lifescribe-backend-${{ matrix.target }}${{ matrix.ext }}"
          if [ -z "${{ matrix.ext }}" ]; then
            chmod +x "../desktop/src-tauri/binaries/lifescribe-backend-${{ matrix.target }}"
          fi
      - name: Upload sidecar artifact
        uses: actions/upload-artifact@v4
        with:
          name: sidecar-${{ matrix.target }}
          path: |
            apps/desktop/src-tauri/binaries/lifescribe-backend-${{ matrix.target }}${{ matrix.ext }}
            apps/backend/dist/connectors/

  build-tauri:
    needs: build-backend
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            ext: .exe
          - os: macos-latest
            target: aarch64-apple-darwin
            ext: ""
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Linux Tauri deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libssl-dev librsvg2-dev libgtk-3-dev libayatana-appindicator3-dev
      - name: Install JS deps
        shell: bash
        run: |
          rm -f package-lock.json
          npm install --no-audit --no-fund
      - name: Download sidecar artifact
        uses: actions/download-artifact@v4
        with:
          name: sidecar-${{ matrix.target }}
          path: apps/desktop/src-tauri/binaries/
      - name: Flatten sidecar artifact
        shell: bash
        run: |
          cd apps/desktop/src-tauri/binaries
          # download-artifact may nest files; flatten them
          if [ -d "apps" ]; then
            find apps -name "lifescribe-backend*" -exec mv {} . \;
            rm -rf apps
          fi
          if [ -d "connectors" ]; then
            echo "connectors already in place"
          elif [ -d "apps/backend/dist/connectors" ]; then
            mv apps/backend/dist/connectors .
            rm -rf apps
          fi
          if [ -z "${{ matrix.ext }}" ]; then
            chmod +x lifescribe-backend-${{ matrix.target }}
          fi
          ls -la
      - name: Build Tauri app
        working-directory: apps/desktop
        shell: bash
        run: npm run tauri build
      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: installer-${{ matrix.target }}
          path: |
            apps/desktop/src-tauri/target/release/bundle/msi/*.msi
            apps/desktop/src-tauri/target/release/bundle/nsis/*.exe
            apps/desktop/src-tauri/target/release/bundle/dmg/*.dmg
            apps/desktop/src-tauri/target/release/bundle/macos/*.app

  release:
    needs: build-tauri
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download all installer artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          pattern: installer-*
          merge-multiple: true
      - name: List artifacts
        run: find artifacts/ -type f | sort
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: |
            ## LifeScribe Vault ${{ github.ref_name }}

            ### Downloads
            - **Windows**: `.msi` installer
            - **macOS**: `.dmg` disk image

            ### What's included
            - §3.1 Vault Foundation
            - §3.2 Ingestion Pipeline
            - §3.3 Dashboard Shell
            - §3.4 LLM Provider Framework
            - §3.5 Chat with Vault
            - §3.6 Connector Framework + Catalog
          files: |
            artifacts/**/*.msi
            artifacts/**/*.exe
            artifacts/**/*.dmg
          draft: false
          prerelease: false
