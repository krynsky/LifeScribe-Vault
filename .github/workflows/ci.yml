name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  backend:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: apps/backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install uv
        uses: astral-sh/setup-uv@v3
      - name: Install dependencies
        run: uv sync --frozen --all-extras
      - name: Lint
        run: |
          uv run ruff format --check .
          uv run ruff check .
      - name: Typecheck
        run: uv run mypy src
      - name: Test
        run: uv run pytest -v

  frontend:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: apps/desktop
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install Linux Tauri deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libssl-dev librsvg2-dev libgtk-3-dev libayatana-appindicator3-dev
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Install JS deps (workspace root)
        working-directory: .
        run: npm ci
      - name: Create placeholder sidecar binary
        shell: bash
        run: |
          TRIPLE=$(rustc -vV | sed -n 's/host: //p')
          mkdir -p src-tauri/binaries
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            : > "src-tauri/binaries/lifescribe-backend-${TRIPLE}.exe"
          else
            : > "src-tauri/binaries/lifescribe-backend-${TRIPLE}"
            chmod +x "src-tauri/binaries/lifescribe-backend-${TRIPLE}"
          fi
      - name: Lint JS/TS
        run: |
          npm run lint
          npm run format:check
          npm run typecheck
      - name: Build frontend (required by tauri::generate_context!)
        run: npm run build
      - name: Lint Rust
        working-directory: apps/desktop/src-tauri
        run: |
          cargo fmt --check
          cargo clippy -- -D warnings
      - name: Test
        run: npm test -- --run
